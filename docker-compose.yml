
services:
  # 1. иі‡ж–™еє«жњЌе‹™ (PostgreSQL)
  db:
    image: postgres:latest
    container_name: cyber_db
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  # 2. еѕЊз«Ї API жњЌе‹™ (.NET 8)
  backend:
    build:
      context: ./CHTProject
      dockerfile: Dockerfile
    container_name: cyber_backend
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      - DB_PASSWORD=${DB_PASSWORD} # зµ¦ Program.cs и®ЂеЏ–зљ„
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5024:8080"
    depends_on:
      - db

  # 3. е‰Ќз«Їз¶Ій ЃжњЌе‹™ (Vue 3)
  frontend:
    build:
      context: ./CHT-Frontend
      dockerfile: Dockerfile
    container_name: cyber_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  db_data: