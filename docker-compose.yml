version: "3.9"

services:
  db:
    image: postgres:15   # 固定版本，避免 18+ 版本資料目錄不兼容
    container_name: cyber_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT_EXTERNAL}:5432"
    networks:
      - cyber_net
    volumes:
      - db_data:/var/lib/postgresql/data   # 乾淨 volume 管理資料
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s   # 等 DB 初始化完成再開始健康檢查

  backend:
    build:
      context: ./CHTProject
      dockerfile: Dockerfile
    container_name: cyber_backend
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}"
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "${BACKEND_PORT}:8080"
    depends_on:
      db:
        condition: service_healthy   # 等 db 健康檢查通過再啟動
    networks:
      - cyber_net

  frontend:
    build:
      context: ./CHT-Frontend
      dockerfile: Dockerfile
    container_name: cyber_frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    networks:
      - cyber_net

networks:
  cyber_net:
    driver: bridge

volumes:
  db_data: